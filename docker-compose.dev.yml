# Desenvolvimento / teste local com Docker (sem rede externa do Nginx Proxy Manager).
#
# Uso: docker compose -f docker-compose.dev.yml up --build
#
# Dados persistidos em ./docker-data no host.

services:
  framework-net:
    build:
      context: .
      dockerfile: Dockerfile
    image: framework-net-java-quarkus:dev
    container_name: framework-net-java-dev
    ports:
      - "127.0.0.1:${HTTP_PORT:-8081}:8080"
    environment:
      QUARKUS_PROFILE: prod
      QUARKUS_HTTP_PORT: "8080"
    volumes:
      - ./docker-data:/deployments/data
      # - ${GEO_DB_HOST_PATH:-./docker-data/geo/GeoLite2-City.mmdb}:/deployments/data/geo/GeoLite2-City.mmdb:ro
    restart: unless-stopped
