<form method="POST" class="row g-3 calc-form" data-tab-form="cidr">
    <input type="hidden" name="tab" value="cidr">
    <div class="col-lg-5">
        <label class="form-label small text-secondary">Endereço IPv4</label>
        <input type="text" name="ip" class="form-control input-ipv4 input-ipv4-network bg-dark text-light border-secondary {#if invalidFields.contains('ip')}is-invalid{/if}"
               placeholder="Ex.: 172.16.0.10 ou 172.16.0.0/24" value="{ipPre}" inputmode="text" autocomplete="off" spellcheck="false">
    </div>
    <div class="col-lg-3">
        <label class="form-label small text-secondary">CIDR <span class="text-secondary fw-normal">(opcional)</span></label>
        <input type="text" name="cidr" class="form-control input-cidr bg-dark text-light border-secondary {#if invalidFields.contains('cidr')}is-invalid{/if}"
               inputmode="numeric" maxlength="2" placeholder="ex.: 24" value="{cidrPre}">
    </div>
    <div class="col-lg-2">
        <label class="form-label small text-secondary">Régua</label>
        <select name="regua_count" class="form-select bg-dark text-light border-secondary">
            <option value="5" {#if reguaCountPre == '5'}selected{/if}>5</option>
            <option value="10" {#if reguaCountPre == '10'}selected{/if}>10</option>
            <option value="15" {#if reguaCountPre == '15'}selected{/if}>15</option>
            <option value="25" {#if reguaCountPre == '25'}selected{/if}>25</option>
            <option value="50" {#if reguaCountPre == '50'}selected{/if}>50</option>
            <option value="100" {#if reguaCountPre == '100'}selected{/if}>100</option>
        </select>
    </div>
    <div class="col-lg-2 tab-actions d-grid gap-2">
        <button type="submit" name="modo" value="cidr" class="aed-btn aed-btn-execute w-100">
            <span class="material-symbols-outlined">play_arrow</span> Executar
        </button>
    </div>
</form>
