quarkus.http.port=8080
quarkus.http.host=0.0.0.0

# Dev: ignora chaves legadas (ex.: -Dframework.app.open-browser) após migração para framework.dev.*
%dev.smallrye.config.mapping.validate-unknown=false

# Dev: abre o navegador automaticamente ao iniciar (quarkusDev)
%dev.framework.dev.open-browser=true
%dev.framework.dev.browser-path=/

# Framework de Redes
framework.app.max-history=60
framework.app.comparador-cidr-padrao-a=20
framework.app.comparador-cidr-padrao-b=24
framework.dns.cache-ttl-seconds=180
framework.dns.resolve-timeout-seconds=3
framework.geo.cache-ttl-seconds=300

# Localização (ViaCEP + geocoding OpenStreetMap/Nominatim)
framework.localizacao.enabled=true
framework.localizacao.viacep-url=https://viacep.com.br/ws
framework.localizacao.nominatim-url=https://nominatim.openstreetmap.org/search
framework.localizacao.user-agent=FrameworkNetRedes/1.0 (didatico; +https://github.com/carmipa)
framework.localizacao.cache-ttl-seconds=86400
framework.localizacao.http-timeout-seconds=5

# Logs e telemetria compartilhada (pasta local para exportação)
framework.logs.base-dir=logs
framework.telemetry.enabled=true
framework.telemetry.dashboard-enabled=true
framework.telemetry.max-events=5000

# Segurança
framework.security.csrf-enabled=true
framework.security.csrf-secret=framework-net-dev-csrf-secret-change-in-prod
framework.security.sensitive-apis-enabled=true
framework.security.rate-limit-enabled=true
framework.security.rate-limit-per-minute=120
framework.security.rate-limit-heavy-per-minute=30
framework.security.admin-api-key=dev-admin-key-local
framework.security.admin-api-key-required=true
# Marca cookies (CSRF/admin) como Secure — deixe false em dev (HTTP), true em prod (HTTPS)
framework.security.cookie-secure=false

# Headers de segurança HTTP
quarkus.http.header.X-Content-Type-Options.value=nosniff
quarkus.http.header.X-Frame-Options.value=SAMEORIGIN
quarkus.http.header.Referrer-Policy.value=strict-origin-when-cross-origin
quarkus.http.header.Permissions-Policy.value=geolocation=(self), microphone=(), camera=()
quarkus.application.name=framework-net-java-quarkus
quarkus.application.version=1.0.0-SNAPSHOT
quarkus.log.file.path=logs/framework-net.log
quarkus.log.file.rotation.max-file-size=10M
quarkus.log.file.rotation.max-backup-index=5
quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%c{2.}] (%t) req=%X{request.id} trace=%X{trace.id} %s%e%n

# GeoIP MaxMind (opcional: colocar GeoLite2-City.mmdb em src/main/resources/geo/)
framework.geo.database-path=geo/GeoLite2-City.mmdb
