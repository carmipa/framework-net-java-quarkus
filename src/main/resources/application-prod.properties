# Perfil prod (Docker / VPS) — ativado com QUARKUS_PROFILE=prod
# Obrigatório no deploy: ADMIN_API_KEY, CSRF_SECRET (ver docker-compose.yml)

framework.security.admin-api-key=${ADMIN_API_KEY:}
framework.security.admin-api-key-required=true
framework.security.csrf-secret=${CSRF_SECRET:}
framework.security.csrf-enabled=true
framework.security.sensitive-apis-enabled=true
framework.security.rate-limit-enabled=true
framework.security.rate-limit-per-minute=120
framework.security.rate-limit-heavy-per-minute=30
# Atrás de proxy TLS (Nginx) — cookies só via HTTPS
framework.security.cookie-secure=true

framework.telemetry.enabled=true
framework.telemetry.dashboard-enabled=true
framework.telemetry.max-events=5000

# Proxy reverso (Nginx Proxy Manager / similar)
quarkus.http.proxy.proxy-address-forwarding=true
quarkus.http.proxy.allow-forwarded=true
quarkus.http.proxy.enable-forwarded-host=true
quarkus.http.proxy.enable-forwarded-prefix=true

# Dados persistentes (volume /deployments/data)
framework.logs.base-dir=/deployments/data/logs
quarkus.log.file.path=/deployments/data/logs/framework-net.log
framework.geo.database-path=/deployments/data/geo/GeoLite2-City.mmdb
