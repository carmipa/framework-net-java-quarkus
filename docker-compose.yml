# Produção na VPS — alinhado ao compose Python (Nginx Proxy Manager + rede externa).
# Pré-requisito na VPS: docker network create nginx-proxy-network
#
# Build e subida:
#   docker compose build
#   docker compose up -d
#
# GeoIP opcional: copie GeoLite2-City.mmdb para ./data/geo/ e descomente o volume abaixo.

services:
  framework-net:
    build:
      context: .
      dockerfile: Dockerfile
    image: framework-net-java-quarkus:latest
    container_name: framework-net-java
    ports:
      - "127.0.0.1:${HTTP_PORT:-8080}:8080"
    environment:
      QUARKUS_PROFILE: prod
      QUARKUS_HTTP_PORT: "8080"
      ADMIN_API_KEY: ${ADMIN_API_KEY:?Defina ADMIN_API_KEY no .env ou ambiente}
      CSRF_SECRET: ${CSRF_SECRET:?Defina CSRF_SECRET no .env ou ambiente}
    volumes:
      - framework-net-data:/deployments/data
      # - ${GEO_DB_HOST_PATH:-./data/geo/GeoLite2-City.mmdb}:/deployments/data/geo/GeoLite2-City.mmdb:ro
    restart: unless-stopped
    networks:
      - nginx-proxy-network

volumes:
  framework-net-data:
    driver: local

networks:
  nginx-proxy-network:
    external: true
