# Produção na VPS — alinhado ao compose Python (Nginx Proxy Manager + rede externa).
# Pré-requisito na VPS: docker network create nginx-proxy-network
#
# Build e subida:
#   docker compose build
#   docker compose up -d
#
# GeoIP opcional: copie GeoLite2-City.mmdb para ./data/geo/ e descomente o volume abaixo.

services:
  framework-net:
    build:
      context: .
      dockerfile: Dockerfile
    image: framework-net-java-quarkus:latest
    container_name: framework-net-java
    ports:
      - "127.0.0.1:${HTTP_PORT:-8080}:8080"
    environment:
      QUARKUS_PROFILE: prod
      QUARKUS_HTTP_PORT: "8080"
      ADMIN_API_KEY: ${ADMIN_API_KEY:?Defina ADMIN_API_KEY no .env ou ambiente}
      CSRF_SECRET: ${CSRF_SECRET:?Defina CSRF_SECRET no .env ou ambiente}
    volumes:
      - framework-net-data:/deployments/data
      # - ${GEO_DB_HOST_PATH:-./data/geo/GeoLite2-City.mmdb}:/deployments/data/geo/GeoLite2-City.mmdb:ro
    # Teto de memória do container (cgroup). SEM isto a JVM enxerga a RAM inteira da VPS
    # e dimensiona o heap por essa fração — causa raiz do consumo alto observado em produção.
    # A JVM lê este limite e aplica -XX:MaxRAMPercentage (ver JAVA_OPTS_APPEND no Dockerfile).
    # memswap_limit igual a mem_limit desabilita swap: evita crescer em disco mascarando o problema.
    mem_limit: ${MEM_LIMIT:-768m}
    memswap_limit: ${MEM_LIMIT:-768m}
    mem_reservation: 256m
    restart: unless-stopped
    networks:
      - nginx-proxy-network

volumes:
  framework-net-data:
    driver: local

networks:
  nginx-proxy-network:
    external: true
